# ---------------------------------------------------------------------
# Sprint 3 — Weekly qlib Alpha158 × LightGBM retrain
# ---------------------------------------------------------------------
#
# This workflow trains the Quant Signal model on a rolling 3-year window
# and uploads the artifact bundle (model.pkl + predictions.json + ic.json)
# as a GitHub Release asset.
#
# IMPORTANT: the schedule trigger is COMMENTED OUT by default so the
# workflow never auto-runs on the user's account until they explicitly
# opt-in by uncommenting the `schedule:` block below.  Use the
# `workflow_dispatch` trigger to run it manually first, validate the
# artifact, then turn on the cron.
#
# Locked decisions (P9):
#   Q2 — retrain weekly (Saturday 02:00 UTC when scheduled)
#   Q3 — default 10-day horizon
#
# Cost: each training run downloads several GB of qlib data and uses
# ~20 minutes of LightGBM CPU.  The GitHub-hosted runner is enough for
# both CN and US training but expect ~30-40 minutes total.
# ---------------------------------------------------------------------

name: qlib-retrain

on:
  # Weekly retrain. Run `workflow_dispatch` at least once after merging
  # any script changes so the artifact bundle is verified end-to-end
  # before relying on the scheduled cron.
  schedule:
    - cron: "0 2 * * 6"   # Saturday 02:00 UTC
  workflow_dispatch:
    inputs:
      regions:
        description: "Comma-separated regions to train (cn,us)"
        required: false
        default: "cn,us"
      horizon:
        description: "Forecast horizon in trading days"
        required: false
        default: "10"

permissions:
  contents: write   # needed to attach assets to the auto-generated release

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install quant requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-quant.txt
          # US build helper needs these on top of requirements-quant.txt
          pip install yfinance yahooquery beautifulsoup4 lxml setuptools_scm

      - name: Download qlib bulk data
        env:
          QLIB_DATA_DIR: data/qlib
          PYTHON: python
          REGIONS_CSV: ${{ github.event.inputs.regions || 'cn,us' }}
        run: |
          set -euo pipefail
          # ``scripts/build_us_qlib_data.py`` shallow-clones microsoft/qlib
          # internally if needed, but doing it up-front keeps the build
          # step deterministic and lets the cache surface it for re-runs.
          if [ ! -d .qlib_tools/qlib ]; then
              mkdir -p .qlib_tools
              git clone --depth 1 https://github.com/microsoft/qlib.git .qlib_tools/qlib
          fi
          export QLIB_TOOLS_DIR="$PWD/.qlib_tools/qlib"
          bash scripts/setup_qlib_data.sh ${REGIONS_CSV//,/ }
        shell: bash

      - name: Train LightGBM Alpha158
        env:
          QLIB_DATA_DIR: data/qlib
          QUANT_MODEL_DIR: data/quant_models
          QUANT_FORECAST_HORIZON: ${{ github.event.inputs.horizon || '10' }}
          REGIONS_CSV: ${{ github.event.inputs.regions || 'cn,us' }}
        run: |
          set -euo pipefail
          for REGION in ${REGIONS_CSV//,/ }; do
              python scripts/train_alpha158_lightgbm.py --region "${REGION}"
          done

      - name: Bundle artifacts
        id: bundle
        run: |
          set -euo pipefail
          WEEK_TAG="$(date -u +'%Y-W%V')"
          mkdir -p artifacts
          if [ -d data/quant_models ]; then
              tar -czf "artifacts/quant-models-${WEEK_TAG}.tar.gz" -C data quant_models
              echo "tag=${WEEK_TAG}" >> "$GITHUB_OUTPUT"
              echo "asset=artifacts/quant-models-${WEEK_TAG}.tar.gz" >> "$GITHUB_OUTPUT"
          else
              echo "No quant_models dir produced — skipping upload."
              echo "asset=" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact (CI run scope)
        if: steps.bundle.outputs.asset != ''
        uses: actions/upload-artifact@v4
        with:
          name: quant-models-${{ steps.bundle.outputs.tag }}
          path: ${{ steps.bundle.outputs.asset }}
          retention-days: 60

      - name: Publish GitHub Release asset
        if: steps.bundle.outputs.asset != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: quant-models-${{ steps.bundle.outputs.tag }}
          name: Quant models ${{ steps.bundle.outputs.tag }}
          body: |
            Weekly Alpha158 × LightGBM artifact bundle.
            Generated by `.github/workflows/qlib-retrain.yml`.
          files: ${{ steps.bundle.outputs.asset }}
          prerelease: true
